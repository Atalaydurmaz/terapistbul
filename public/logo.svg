<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Blue circle border -->
  <circle cx="50" cy="50" r="47" fill="white" stroke="#1a56db" stroke-width="4"/>

  <!-- Teal person body -->
  <circle cx="50" cy="28" r="9" fill="#0d9488"/>

  <!-- Arms open wide -->
  <path d="M50 40 Q50 50 50 55" stroke="#0d9488" stroke-width="10" stroke-linecap="round" fill="none"/>
  <!-- Left arm -->
  <path d="M50 44 Q38 42 28 38" stroke="#0d9488" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- Right arm (with white hugging hand) -->
  <path d="M50 44 Q62 42 72 38" stroke="#0d9488" stroke-width="7" stroke-linecap="round" fill="none"/>

  <!-- White hugging hand from the right -->
  <path d="M44 50 Q36 47 30 52 Q34 58 42 55 Z" fill="white" opacity="0.9"/>

  <!-- Teal smile/wave -->
  <path d="M32 70 Q50 82 68 70" stroke="#0d9488" stroke-width="6" stroke-linecap="round" fill="none"/>
</svg>
